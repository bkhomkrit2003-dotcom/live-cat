<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cat Overlay</title>
<style>
  /* ===== ปรับแต่งได้ตรงนี้ ===== */
  :root{
    --cat-width:200px;     /* ขนาดแมว ปรับใหญ่/เล็กได้ */
    --walk-speed:14s;      /* ความเร็วเดินรอบจอ (มาก = ช้า) */
    --cat-bottom:6%;       /* ระยะห่างจากขอบล่างจอ */
  }

  /* พื้นหลังโปร่งใส 100% สำหรับซ้อนบนไลฟ์ */
  html,body{
    margin:0; padding:0;
    width:100%; height:100%;
    background:transparent;
    overflow:hidden;
  }

  .stage{ position:fixed; inset:0; }

  /* ตัวแมว เดินข้ามจอไป-กลับ */
  .cat{
    position:absolute;
    bottom:var(--cat-bottom);
    left:0;
    width:var(--cat-width);
    height:auto;
    image-rendering:pixelated;          /* คงความคมของพิกเซลอาร์ต */
    transform-origin:bottom center;
    animation:walk var(--walk-speed) linear infinite,
              bob calc(var(--walk-speed)/28) ease-in-out infinite;
    will-change:transform, left;
  }

  /* เดินไปขวา -> หันกลับ -> เดินกลับซ้าย วนไม่รู้จบ */
  @keyframes walk{
    0%   { left:-16%;  transform:scaleX(1); }
    47%  { left:92%;   transform:scaleX(1); }
    50%  { left:92%;   transform:scaleX(-1); }
    97%  { left:-16%;  transform:scaleX(-1); }
    100% { left:-16%;  transform:scaleX(1); }
  }

  /* เด้งตัวเบาๆ เหมือนเดินจริง */
  @keyframes bob{
    0%,100% { transform:translateY(0)   rotate(0deg); }
    25%     { transform:translateY(-6px) rotate(-1.5deg); }
    50%     { transform:translateY(0)   rotate(0deg); }
    75%     { transform:translateY(-6px) rotate(1.5deg); }
  }

  /* เงาใต้ตัวแมว ขยับตามจังหวะเดิน */
  .shadow{
    position:absolute;
    bottom:calc(var(--cat-bottom) - 6px);
    left:0;
    width:calc(var(--cat-width) * 0.7);
    height:14px;
    background:rgba(60,20,90,.22);
    border-radius:50%;
    filter:blur(3px);
    animation:walk-shadow var(--walk-speed) linear infinite,
              shadow-pulse calc(var(--walk-speed)/28) ease-in-out infinite;
  }
  @keyframes walk-shadow{
    0%   { left:calc(-16% + (var(--cat-width) * 0.15)); }
    47%  { left:calc(92%  + (var(--cat-width) * 0.15)); }
    50%  { left:calc(92%  + (var(--cat-width) * 0.15)); }
    97%  { left:calc(-16% + (var(--cat-width) * 0.15)); }
    100% { left:calc(-16% + (var(--cat-width) * 0.15)); }
  }
  @keyframes shadow-pulse{
    0%,100%{ transform:scale(1);   opacity:.22; }
    50%    { transform:scale(.82); opacity:.14; }
  }
</style>
</head>
